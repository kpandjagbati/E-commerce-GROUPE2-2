#spring.application.name=assigame
# Port d'écoute (Render fournit la variable PORT)
server.port=${PORT:8080}
# URL de connexion à la base de données PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dbassigame}
# Identifiants de connexion
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Arustide12}
# Driver PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# JWT
jwt.secret=${JWT_SECRET:YXNzaWdhbWVzZWNyZXRrZXk0ODBpdHNtaW5pbXVtc2l6ZWZvcmhzMjU2YQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}
# Origines autorisees pour le CORS (separees par des virgules)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}
